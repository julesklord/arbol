name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: shellcheck
        uses: ludeeus/action-shellcheck@v1
        with:
          args: scripts/mini-fetch.sh
      - name: Build (if present)
        run: |
          if [ -f main.go ]; then go build -o mini-fetch .; else echo "no main.go"; fi
